<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাকি খাতা (ধাপে ধাপে পরিশোধ) - আপন হাট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #fdf2f2; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-red-800 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg"><i class="fas fa-book-open mr-2"></i>বাকি খাতা (হিসাব)</h1>
            <a href="owner-dashboard.html" class="bg-white text-red-800 px-3 py-1 rounded-full text-xs font-bold">ড্যাশবোর্ড</a>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-2xl">
        <!-- সারাংশ কার্ড -->
        <div class="bg-white p-6 rounded-3xl shadow-xl mb-6 flex justify-between items-center border-t-4 border-red-600">
            <div>
                <p class="text-gray-500 text-xs font-bold uppercase">মোট বকেয়া পাওনা</p>
                <h2 class="text-3xl font-black text-red-600">৳ <span id="total-due-amount">0</span></h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 font-bold uppercase">আজকের আদায়</p>
                <p class="text-xl font-bold text-green-600">৳ <span id="today-collection">0</span></p>
            </div>
        </div>

        <input type="text" id="search-due" onkeyup="filterDue()" placeholder="কাস্টমারের নাম বা ফোন..." class="w-full p-4 rounded-2xl border mb-6 outline-none focus:ring-2 focus:ring-red-500 shadow-sm">

        <!-- বকেয়া তালিকা -->
        <div id="due-list" class="space-y-6">
            <p class="text-center py-10 text-gray-400">খাতা খোলা হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, onSnapshot, doc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const q = query(collection(db, "orders"), where("paymentStatus", "==", "due"));

        onSnapshot(q, (snapshot) => {
            const listArea = document.getElementById('due-list');
            const totalArea = document.getElementById('total-due-amount');
            let totalDue = 0;
            listArea.innerHTML = snapshot.empty ? `<p class="text-center py-10 text-gray-400 font-bold">সব বকেয়া পরিষ্কার! 😊</p>` : "";

            snapshot.forEach((orderDoc) => {
                const order = orderDoc.data();
                const id = orderDoc.id;
                
                // হিসাব লজিক
                const totalBill = Number(order.totalBill);
                const paidSoFar = Number(order.paidAmount || 0); // আগে কত জমা দিয়েছে
                const currentRemaining = totalBill - paidSoFar;
                totalDue += currentRemaining;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[30px] shadow-sm border border-red-50 relative overflow-hidden";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">${order.customerName}</h3>
                            <p class="text-xs text-blue-600 font-bold"><i class="fas fa-phone-alt"></i> ${order.customerPhone}</p>
                        </div>
                        <div class="bg-red-50 px-3 py-1 rounded-full text-red-600 text-[10px] font-black uppercase">বাকি আছে</div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 my-4 text-center border-y border-dashed py-3">
                        <div><p class="text-[9px] text-gray-400 uppercase">মোট বিল</p><p class="font-bold">৳${totalBill}</p></div>
                        <div><p class="text-[9px] text-gray-400 uppercase">মোট জমা</p><p class="font-bold text-green-600">৳${paidSoFar}</p></div>
                        <div><p class="text-[9px] text-gray-400 uppercase">নিট বকেয়া</p><p class="font-black text-red-600">৳${currentRemaining}</p></div>
                    </div>

                    <!-- টাকা জমার ইনপুট -->
                    <div class="flex gap-2 mb-4">
                        <input type="number" id="pay-amt-${id}" placeholder="টাকার পরিমাণ" class="flex-1 p-2 bg-gray-50 border rounded-xl outline-none text-sm focus:border-green-500">
                        <button onclick="updatePartialPayment('${id}', ${currentRemaining})" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md active:scale-95 transition">জমা নিন</button>
                    </div>

                    <!-- পেমেন্ট হিস্ট্রি টগল -->
                    <details class="text-[10px]">
                        <summary class="cursor-pointer text-blue-500 font-bold">পেমেন্ট হিস্ট্রি দেখুন</summary>
                        <div class="mt-2 space-y-1 text-gray-500">
                            ${order.paymentHistory ? order.paymentHistory.map(h => `<div class="flex justify-between border-b pb-1"><span>${h.date}</span> <span>৳${h.amount}</span></div>`).join('') : 'কোন হিস্ট্রি নেই'}
                        </div>
                    </details>
                `;
                listArea.appendChild(card);
            });
            totalArea.innerText = totalDue.toLocaleString('bn-BD');
        });

        // আংশিক পেমেন্ট আপডেট করার ফাংশন
        window.updatePartialPayment = async (id, remaining) => {
            const input = document.getElementById(`pay-amt-${id}`);
            const amount = Number(input.value);

            if (!amount || amount <= 0) return alert("সঠিক টাকার পরিমাণ লিখুন।");
            if (amount > remaining) return alert("বকেয়া টাকার চেয়ে বেশি জমা নেওয়া যাবে না!");

            if (confirm(`৳${amount} টাকা জমা নিতে চান?`)) {
                try {
                    const orderRef = doc(db, "orders", id);
                    const now = new Date().toLocaleString('bn-BD');
                    
                    // ফায়ারবেস আপডেট
                    await updateDoc(orderRef, {
                        paidAmount: increment(amount), // আগের জমার সাথে নতুন টাকা যোগ
                        paymentHistory: arrayUnion({
                            date: now,
                            amount: amount
                        })
                    });

                    // যদি সব টাকা শোধ হয়ে যায়
                    if (amount === remaining) {
                        await updateDoc(orderRef, { paymentStatus: 'paid' });
                    }

                    alert("টাকা সফলভাবে জমা হয়েছে!");
                    input.value = "";
                } catch (e) {
                    alert("সমস্যা হয়েছে: " + e.message);
                }
            }
        };

        window.filterDue = () => {
            const term = document.getElementById('search-due').value.toLowerCase();
            const cards = document.querySelectorAll('#due-list > div');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? "block" : "none";
            });
        };
    </script>
</body>
</html>
