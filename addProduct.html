<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন পণ্য যোগ করুন - আপন হাট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="pb-10">

    <div class="container mx-auto p-4 max-w-lg">
        <div class="bg-white p-8 rounded-[40px] shadow-xl border-t-8 border-green-600 mt-6">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-green-700 uppercase tracking-tighter">নতুন পণ্য যোগ করুন</h2>
                <p class="text-xs text-slate-400 mt-1 italic">সঠিক তথ্য দিয়ে ডাটাবেজ আপডেট করুন</p>
            </div>
            
            <form id="product-form" class="space-y-5">
                <!-- পণ্যের নাম -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-1">
                        <i class="fas fa-shopping-basket mr-1 text-green-600"></i> পণ্যের নাম
                    </label>
                    <input type="text" id="p-name" placeholder="যেমন: সয়াবিন তেল ১ লিটার" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-500 bg-slate-50 transition-all" required>
                </div>

                <!-- ক্যাটাগরি -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-1">
                        <i class="fas fa-tags mr-1 text-green-600"></i> ক্যাটাগরি
                    </label>
                    <input list="category-list" id="p-category" placeholder="যেমন: মুদি, কসমেটিকস" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-500 bg-slate-50 transition-all" required>
                    <datalist id="category-list">
                        <option value="মুদি">
                        <option value="ইলেক্ট্রিক">
                        <option value="কসমেটিকস">
                        <option value="মসলা">
                        <option value="ডাল ও চাল">
                    </datalist>
                </div>

                <!-- একাধিক ছবির লিংক সেকশন -->
                <div id="image-inputs-container">
                    <label class="block text-xs font-bold text-blue-600 uppercase ml-1 mb-1">
                        <i class="fas fa-image mr-1"></i> ছবির লিংক সমূহ (Image URLs)
                    </label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" class="p-image-input w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-xs" placeholder="মূল ছবির ডিরেক্ট লিংক দিন" required>
                    </div>
                </div>
                <button type="button" onclick="addImageField()" class="text-[10px] bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold hover:bg-blue-200 transition-all">
                    <i class="fas fa-plus-circle mr-1"></i> আরও ছবি যোগ করুন
                </button>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-dashed">
                    <!-- ক্রয় মূল্য -->
                    <div>
                        <label class="block text-[10px] font-bold text-red-500 uppercase ml-1 mb-1">ক্রয় মূল্য (৳)</label>
                        <input type="number" id="p-buy" placeholder="১৬০" class="w-full p-4 border rounded-2xl outline-none focus:border-red-500 bg-slate-50" required>
                    </div>
                    <!-- বিক্রয় মূল্য -->
                    <div>
                        <label class="block text-[10px] font-bold text-green-600 uppercase ml-1 mb-1">বিক্রয় মূল্য (৳)</label>
                        <input type="number" id="p-sell" placeholder="১৮০" class="w-full p-4 border rounded-2xl outline-none focus:border-green-500 bg-slate-50" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- পুরানো মূল্য (MRP) - নতুন যুক্ত করা হয়েছে -->
                    <div>
                        <label class="block text-[10px] font-bold text-orange-500 uppercase ml-1 mb-1">পুরানো মূল্য/MRP (৳)</label>
                        <input type="number" id="p-regular" placeholder="২০০ (যদি থাকে)" class="w-full p-4 border rounded-2xl outline-none focus:border-orange-500 bg-slate-50">
                    </div>
                    <!-- ওজন (গ্রাম) -->
                    <div>
                        <label class="block text-[10px] font-bold text-blue-500 uppercase ml-1 mb-1">ওজন (গ্রাম-এ)</label>
                        <input type="number" id="p-weight" placeholder="১০০০" class="w-full p-4 border rounded-2xl outline-none focus:border-blue-500 bg-slate-50" required>
                    </div>
                </div>

                <!-- স্টক -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-1">স্টক পরিমাণ</label>
                    <input type="number" id="p-stock" placeholder="৫০" class="w-full p-4 border rounded-2xl outline-none focus:border-green-500 bg-slate-50" required>
                </div>

                <!-- পণ্যের বিবরণ (Description) -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-1">
                        <i class="fas fa-file-alt mr-1 text-green-600"></i> পণ্যের বিবরণ
                    </label>
                    <textarea id="p-desc" rows="3" placeholder="পণ্যের গুণাগুণ বা বিস্তারিত লিখুন..." class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-500 bg-slate-50 min-h-[100px]"></textarea>
                </div>

                <!-- সেভ বাটন -->
                <button type="submit" id="save-btn" class="w-full bg-green-600 text-white py-5 rounded-[25px] font-black text-lg shadow-xl hover:bg-green-700 active:scale-95 transition-all">পণ্য সেভ করুন</button>
                
                <button type="button" onclick="window.location.href='owner-dashboard.html'" class="w-full text-slate-400 font-bold text-sm">ড্যাশবোর্ডে ফিরে যান</button>
            </form>
            
            <p id="msg" class="mt-4 text-center font-bold"></p>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ইমেজ ইনপুট বাড়ানোর ফাংশন
        window.addImageField = () => {
            const container = document.getElementById('image-inputs-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 mb-2 animate-pulse";
            div.innerHTML = `
                <input type="text" class="p-image-input w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-xs" placeholder="পরের ছবির লিংক">
                <button type="button" onclick="this.parentElement.remove()" class="bg-red-100 text-red-500 px-3 rounded-xl"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
            setTimeout(() => div.classList.remove('animate-pulse'), 500);
        };

        const productForm = document.getElementById('product-form');
        const msg = document.getElementById('msg');

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "সেভ হচ্ছে...";

            // সব ইমেজ লিংক সংগ্রহ
            const imageUrls = Array.from(document.querySelectorAll('.p-image-input'))
                                   .map(input => input.value.trim())
                                   .filter(val => val !== "")
                                   .join(',');

            const productData = {
                name: document.getElementById('p-name').value.trim(),
                category: document.getElementById('p-category').value.trim(),
                image: imageUrls,
                buyPrice: Number(document.getElementById('p-buy').value),
                sellPrice: Number(document.getElementById('p-sell').value),
                regularPrice: Number(document.getElementById('p-regular').value) || 0, // পুরানো মূল্যের ডাটা
                weight: Number(document.getElementById('p-weight').value), 
                stock: Number(document.getElementById('p-stock').value),
                description: document.getElementById('p-desc').value.trim(), 
                createdAt: new Date()
            };

            try {
                await addDoc(collection(db, "products"), productData);
                msg.innerText = "অভিনন্দন! সফলভাবে পণ্যটি যোগ করা হয়েছে।";
                msg.className = "mt-4 text-center font-bold text-green-600";
                productForm.reset();
                
                // ইমেজ ইনপুট রিসেট
                document.getElementById('image-inputs-container').innerHTML = `
                    <label class="block text-xs font-bold text-blue-600 uppercase ml-1 mb-1">ছবির লিংক সমূহ (Image URLs)</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" class="p-image-input w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-xs" placeholder="মূল ছবির ডিরেক্ট লিংক দিন" required>
                    </div>`;
            } catch (error) {
                msg.innerText = "দুঃখিত! সমস্যা হয়েছে: " + error.message;
                msg.className = "mt-4 text-center font-bold text-red-600";
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "পণ্য সেভ করুন";
            }
        });
    </script>
</body>
</html>
