<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কর্মী নিয়োগ - আপন হাট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; display: none; } 
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-tie text-blue-600 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">নতুন কর্মী যোগ করুন</h2>
            <p class="text-gray-500 text-sm">সঠিক পদবী নির্বাচন করে কর্মী তৈরি করুন</p>
        </div>

        <form id="create-user-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">কর্মীর নাম</label>
                <input type="text" id="staff-name" placeholder="নাম লিখুন" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">ইমেইল ঠিকানা</label>
                <input type="email" id="staff-email" placeholder="ইমেইল দিন" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">পাসওয়ার্ড</label>
                <input type="password" id="staff-pass" placeholder="৬ সংখ্যার পাসওয়ার্ড" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">পদবী (Role):</label>
                <select id="staff-role" class="w-full p-3 border rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-blue-500">
                    <option value="assistant">সহকারী (Assistant)</option>
                    <option value="delivery">ডেলিভারি ম্যান (Delivery Man)</option>
                    <option value="helper">সাহায্যকারী (Helper)</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i>
                <span>কর্মী একাউন্ট তৈরি করুন</span>
            </button>
        </form>

        <div class="mt-6 p-4 bg-red-50 rounded-xl border border-red-100">
            <p class="text-[10px] text-red-600 font-bold uppercase">সতর্কতা:</p>
            <p class="text-[11px] text-red-500 italic mt-1 leading-relaxed">
                নতুন কর্মী তৈরি করার পর আপনি (মালিক) স্বয়ংক্রিয়ভাবে লগ-আউট হয়ে যাবেন। এরপর পুনরায় আপনার মালিকের আইডি দিয়ে লগইন করবেন।
            </p>
        </div>
        
        <button onclick="window.location.href='owner-dashboard.html'" class="w-full mt-4 text-gray-400 text-xs font-bold">ফিরে যান</button>
    </div>

    <script type="module">
        import { db, auth } from "./firebase-config.js";
        import { onAuthStateChanged, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // এই ভেরিয়েবলটি চেক করবে আমরা এখন কর্মী তৈরি করছি কি না
        let isCreatingUser = false; 

        // ১. প্রবেশাধিকার যাচাই
        onAuthStateChanged(auth, async (user) => {
            // যদি আমরা এখন কর্মী তৈরি করার মাঝখানে থাকি, তবে এই চেকটি চলবে না
            if (isCreatingUser) return; 

            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().role === 'owner') {
                    document.body.style.display = "block"; // মালিক হলে পেজ দেখাবে
                } else {
                    alert("আপনার এই পেজে প্রবেশের অনুমতি নেই!");
                    window.location.href = "login.html";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // ২. কর্মী নিয়োগ প্রক্রিয়া
        document.getElementById('create-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            if(!confirm("আপনি কি নিশ্চিতভাবে এই কর্মী যোগ করতে চান?")) return;

            isCreatingUser = true; // সিকিউরিটি চেক সাময়িকভাবে বন্ধ করলাম
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> তৈরি হচ্ছে...`;

            const name = document.getElementById('staff-name').value;
            const email = document.getElementById('staff-email').value;
            const pass = document.getElementById('staff-pass').value;
            const role = document.getElementById('staff-role').value;

            try {
                // নতুন একাউন্ট তৈরি
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                
                // ডাটাবেজে তথ্য সেভ (নতুন ইউজার তখন লগইন অবস্থায় থাকবে)
                await setDoc(doc(db, "users", userCred.user.uid), {
                    name: name,
                    email: email,
                    role: role,
                    commissionRate: (role === 'helper') ? 1 : 0, 
                    createdAt: new Date()
                });

                alert("সফল! কর্মী নিয়োগ সম্পন্ন হয়েছে। সিকিউরিটির কারণে আপনাকে লগ-আউট করা হচ্ছে। পুনরায় মালিকের আইডি দিয়ে লগইন করুন।");
                
                // কাজ শেষে নতুন ইউজারকে লগ-আউট করে মালিককে লগইন পেজে পাঠানো
                await signOut(auth);
                window.location.href = "login.html";

            } catch (err) { 
                console.error(err);
                isCreatingUser = false; // ভুল হলে সিকিউরিটি চেক আবার চালু করলাম
                if(err.code === 'auth/email-already-in-use'){
                    alert("এই ইমেইল দিয়ে ইতিমধ্যে একাউন্ট খোলা আছে।");
                } else {
                    alert("ভুল হয়েছে: " + err.message); 
                }
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span>কর্মী একাউন্ট তৈরি করুন</span>`;
            }
        });
    </script>
</body>
</html>
