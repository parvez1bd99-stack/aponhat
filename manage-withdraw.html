<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>উইথড্র রিকোয়েস্ট - আপন হাট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap'); body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 pb-10">
    <nav class="bg-orange-600 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold">টাকা উত্তোলনের তালিকা</h1>
            <a href="owner-dashboard.html" class="bg-white text-orange-600 px-3 py-1 rounded-full text-xs font-bold">ড্যাশবোর্ড</a>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-2xl">
        <div id="request-list" class="space-y-4">
            <p class="text-center py-20 text-gray-400">রিকোয়েস্ট চেক করা হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, onSnapshot, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const q = query(collection(db, "withdraw_requests"), where("status", "==", "pending"));

        onSnapshot(q, (snapshot) => {
            const listArea = document.getElementById('request-list');
            listArea.innerHTML = snapshot.empty ? `<p class="text-center py-20 text-gray-400">কোন পেন্ডিং রিকোয়েস্ট নেই।</p>` : "";

            snapshot.forEach((reqDoc) => {
                const req = reqDoc.data();
                const id = reqDoc.id;

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[30px] shadow-sm border border-orange-100 flex flex-col gap-4";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg text-slate-800">${req.helperName || 'হেলপার'}</h3>
                            <p class="text-sm text-orange-600 font-bold"><i class="fas fa-mobile-alt"></i> বিকাশ: ${req.phone}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400 uppercase">টাকার পরিমাণ</p>
                            <p class="text-2xl font-black text-slate-800">৳${req.amount}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveWithdraw('${id}', '${req.helperId}', ${req.amount})" class="flex-1 bg-green-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-green-100 active:scale-95 transition">টাকা পাঠিয়েছি (Confirm)</button>
                        <button onclick="rejectWithdraw('${id}')" class="bg-red-50 text-red-500 px-5 rounded-2xl font-bold">বাতিল</button>
                    </div>
                `;
                listArea.appendChild(card);
            });
        });

        // টাকা পাঠানোর পর কনফার্মেশন লজিক
        window.approveWithdraw = async (reqId, helperId, amount) => {
            if(confirm("আপনি কি বিকাশে টাকা পাঠিয়েছেন? কনফার্ম করলে হেলপারের অ্যাকাউন্ট থেকে টাকা কেটে যাবে।")) {
                try {
                    // ১. হেলপারের ব্যালেন্স কমানো
                    const helperRef = doc(db, "users", helperId);
                    const helperSnap = await getDoc(helperRef);
                    
                    if (helperSnap.exists() && helperSnap.data().walletBalance >= amount) {
                        await updateDoc(helperRef, {
                            walletBalance: increment(-amount)
                        });

                        // ২. রিকোয়েস্ট স্ট্যাটাস আপডেট
                        await updateDoc(doc(db, "withdraw_requests", reqId), {
                            status: 'paid',
                            paidAt: new Date()
                        });

                        alert("সফল! হেলপারের ব্যালেন্স আপডেট করা হয়েছে।");
                    } else {
                        alert("ভুল! হেলপারের ব্যালেন্স পর্যাপ্ত নয়।");
                    }
                } catch (e) {
                    alert("ত্রুটি: " + e.message);
                }
            }
        };

        window.rejectWithdraw = async (id) => {
            if(confirm("রিকোয়েস্টটি বাতিল করতে চান?")) {
                await updateDoc(doc(db, "withdraw_requests", id), { status: 'rejected' });
            }
        };
    </script>
</body>
</html>
